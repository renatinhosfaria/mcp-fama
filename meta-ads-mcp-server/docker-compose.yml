version: "3.8"

services:
  mcp-facebook-ads:
    image: mcp-facebook-ads:latest
    networks:
      - network_public
    environment:
      - API_KEY=6e2e0b036426d4057926c207e60bc7a2805108a3f28f87181fab2bdaaa3da034
      - PORT=3200
      - RATE_LIMIT_RPM=60
      - NODE_ENV=production
      - META_ACCESS_TOKEN=EAAZA3PuDpLAgBQ61U0sVxVZCfESOr7tIlsTwJoZAVZAZAke62W696LDdEufxjXkeIPdN75anlZALs4SQqVmZAm7gACvYpq9pw365UgYakuZBisXRSvThQGuMri4owX8yDDTPrnZBVKpRIsphkYjctiEWsU2yEmx6wh5ZCXgfQsg5TacHmkaeDA4CXpPFz9fcEZCNgZDZD
      - META_AD_ACCOUNT_ID=act_24036721645944375
      - META_API_VERSION=v25.0
      - META_BUSINESS_ID=1190286072868410
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - "traefik.http.routers.mcp_facebook_ads.rule=Host(`mcp-facebook-ads.famachat.com.br`)"
        - traefik.http.routers.mcp_facebook_ads.entrypoints=websecure
        - traefik.http.routers.mcp_facebook_ads.tls=true
        - traefik.http.routers.mcp_facebook_ads.tls.certresolver=letsencryptresolver
        - traefik.http.services.mcp_facebook_ads.loadbalancer.server.port=3200

networks:
  network_public:
    external: true
