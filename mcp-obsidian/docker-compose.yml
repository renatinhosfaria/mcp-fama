version: "3.8"

services:
  mcp-obsidian:
    image: mcp-obsidian:latest
    networks:
      - network_public
    environment:
      - PORT=3201
      - API_KEY_FILE=/run/secrets/mcp_obsidian_api_key
      - VAULT_PATH=/vault
      - RATE_LIMIT_RPM=300
      - NODE_ENV=production
    secrets:
      - mcp_obsidian_api_key
    volumes:
      - /root/fama-brain:/vault:rw
      - /var/log/mcp-obsidian:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - "traefik.http.routers.mcp_obsidian.rule=Host(`mcp-obsidian.famachat.com.br`)"
        - traefik.http.routers.mcp_obsidian.entrypoints=websecure
        - traefik.http.routers.mcp_obsidian.tls=true
        - traefik.http.routers.mcp_obsidian.tls.certresolver=letsencryptresolver
        - traefik.http.services.mcp_obsidian.loadbalancer.server.port=3201

secrets:
  mcp_obsidian_api_key:
    external: true

networks:
  network_public:
    external: true
